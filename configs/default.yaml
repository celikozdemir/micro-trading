mode: observe
venue: binance_usdm_futures
symbols:
- BTCUSDT
- ETHUSDT
data_streams:
- bookTicker
- aggTrade
- markPrice_1s
strategy:
  type: burst_momentum
  window_ms: 250             # burst detection window for AFI / trade-count (ms)
  trade_count_trigger: 3     # Reduced floor since OBI/AFI/Macro are more selective
  move_bps_trigger: 0.5      # Physical move required for burst confirmation

  # ── Three-gate signal filters (all must fire simultaneously) ──────
  intensity_spike_mult: 4.0     # Global floor (BTC/ETH have specific overrides below)

  # Gate 2: Volatility expansion (EWMA ratio)
  sigma_fast_halflife_ms: 500    # reacts within one burst duration (~500ms)
  sigma_slow_halflife_ms: 45000
  vol_expansion_ratio: 1.5      # sigma_fast must be 1.5× background to trigger

  # Gate 3: Notional Aggressive Flow Imbalance
  afi_threshold: 0.45

  # Gate 4: Micro-regime crossover filter
  trend_halflife_ms: 20000         # 20s slow micro-EMA (regime reference)
  short_trend_halflife_ms: 2000    # 2s fast micro-EMA (burst-speed momentum)
  trend_warmup_ms: 30000           # 30s warmup is enough for 20s EWMA to stabilize

  # ── Macro Regime Parameters (15m filter) ────────────────────────
  macro_trend_halflife_ms: 900000  # 15-minute macro regime
  macro_trend_warmup_ms: 600000    # 10-minute stabilization before gate fires
  
  # ── Advanced Momentum Parameters ────────────────────────────────
  obi_threshold: 0.15
  short_only: false              # ← BIDIRECTIONAL: trade both longs and shorts
  adaptive_vol_multiplier: 0.0
  funding_rate_filter: true      # Skip longs when funding > 0.03%, shorts when < -0.03%
  # ──────────────────────────────────────────────────────────────────
  
  # ── Per-Symbol Overrides ──────────────────────────────────────────
  symbol_overrides:
    BTCUSDT:
      obi_threshold: 0.18           
      intensity_spike_mult: 4.0     
      move_bps_trigger: 0.6
    ETHUSDT:
      obi_threshold: 0.12           
      intensity_spike_mult: 8.0     
      move_bps_trigger: 1.0
  # ──────────────────────────────────────────────────────────────────
  
  # ── ML Signal Scoring (Phase 2) ─────────────────────────────────
  ml:
    enabled: false               # Set to true after training models
    threshold: 0.55              # P(profitable) must exceed this to enter
    model_dir: models            # Directory containing signal_long.json / signal_short.json
  # ──────────────────────────────────────────────────────────────────

  entry_qty:
    BTCUSDT: 0.001
    ETHUSDT: 0.01
  exit:
    # NOTE: These are now FALLBACK values only.
    # The strategy uses regime-adaptive TP/SL/hold based on 5-min realized vol:
    #   Low vol:    TP=15,  SL=8,   hold=60s
    #   Medium vol: TP=30,  SL=15,  hold=120s
    #   High vol:   TP=50,  SL=25,  hold=300s
    # Trail trigger/distance are also regime-proportional (40%/20% of TP).
    max_hold_ms: 120000        # 2 min default (overridden by regime)
    take_profit_bps: 30.0      # Medium-vol default (overridden by regime)
    stop_loss_bps: 15.0
    trail_trigger_bps: 12.0    # Legacy: now regime-proportional
    trail_bps: 6.0             # Legacy: now regime-proportional
  cooldown_ms: 2000           # 2s: prevents re-entering the same burst 3-4 times
risk:
  max_trades_per_min: 60
  daily_loss_usd: 50
  max_consecutive_losses: 5
  max_spread_bps: 6
  max_ws_lag_ms: 300
  reconnect_storm:
    max_reconnects: 10
    window_min: 10
telemetry:
  flush_interval_s: 1
  latency_log_interval_s: 60
