mode: observe
venue: binance_usdm_futures
symbols:
- BTCUSDT
- ETHUSDT
data_streams:
- bookTicker
- aggTrade
- markPrice_1s
strategy:
  type: burst_momentum
  window_ms: 250             # burst detection window for AFI / trade-count (ms)
  trade_count_trigger: 5     # min trades in window — filters ambient noise
  move_bps_trigger: 1.5      # global floor — only react to real moves, not noise

  # ── Three-gate signal filters (all must fire simultaneously) ──────
  intensity_spike_mult: 6.0     # 1s notional must be 6× the 60s avg

  # Gate 2: Volatility expansion (EWMA ratio)
  sigma_fast_halflife_ms: 500
  sigma_slow_halflife_ms: 45000
  vol_expansion_ratio: 2.0      # require 2× background vol, was 1.5

  # Gate 3: Notional Aggressive Flow Imbalance
  afi_threshold: 0.55            # require strong directional conviction, was 0.45

  # Gate 4: Micro-regime crossover filter
  trend_halflife_ms: 20000
  short_trend_halflife_ms: 2000
  trend_warmup_ms: 30000

  # ── Macro Regime Parameters (15m filter) ────────────────────────
  macro_trend_halflife_ms: 900000
  macro_trend_warmup_ms: 600000
  
  # ── Advanced Momentum Parameters ────────────────────────────────
  obi_threshold: 0.20             # was 0.15
  short_only: false
  adaptive_vol_multiplier: 0.0
  funding_rate_filter: true
  # ──────────────────────────────────────────────────────────────────
  
  # ── Per-Symbol Overrides ──────────────────────────────────────────
  symbol_overrides:
    BTCUSDT:
      obi_threshold: 0.22           # was 0.18
      intensity_spike_mult: 6.0     # was 4.0
      move_bps_trigger: 2.0         # was 0.6 — only real BTC moves
    ETHUSDT:
      obi_threshold: 0.18           # was 0.12
      intensity_spike_mult: 10.0    # was 8.0
      move_bps_trigger: 2.5         # was 1.0 — only real ETH moves
  # ──────────────────────────────────────────────────────────────────
  
  # ── ML Signal Scoring (Phase 2) ─────────────────────────────────
  ml:
    enabled: true                # Feature logging always active; ML gate activates when models exist
    threshold: 0.55
    model_dir: models
  # ──────────────────────────────────────────────────────────────────

  entry_qty:
    BTCUSDT: 0.001
    ETHUSDT: 0.01
  exit:
    # Regime-adaptive TP/SL/hold (set in strategy code):
    #   Low vol:    TP=8,   SL=5,   hold=45s
    #   Medium vol: TP=15,  SL=8,   hold=90s
    #   High vol:   TP=30,  SL=15,  hold=180s
    # Trail: trigger at 40% of TP, distance 25% of TP
    max_hold_ms: 90000          # fallback
    take_profit_bps: 15.0       # fallback
    stop_loss_bps: 8.0          # fallback
    trail_trigger_bps: 6.0      # fallback
    trail_bps: 3.0              # fallback
  cooldown_ms: 5000             # 5s cooldown — was 2s, prevent rapid re-entry
risk:
  max_trades_per_min: 20        # was 60 — hard cap on overtrading
  daily_loss_usd: 50
  max_consecutive_losses: 5
  max_spread_bps: 6
  max_ws_lag_ms: 300
  reconnect_storm:
    max_reconnects: 10
    window_min: 10
telemetry:
  flush_interval_s: 1
  latency_log_interval_s: 60
