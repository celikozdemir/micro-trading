mode: observe
venue: binance_usdm_futures
symbols:
- BTCUSDT
- ETHUSDT
data_streams:
- bookTicker
- aggTrade
- markPrice_1s
strategy:
  type: burst_momentum
  window_ms: 250             # burst detection window for AFI / trade-count (ms)
  trade_count_trigger: 5     # minimum trades in window (noise floor only)
  move_bps_trigger: 2.0      # minimum mid-price displacement in window (bps)

  # ── Three-gate signal filters (all must fire simultaneously) ──────
  # Gate 1: Relative intensity spike
  # Current 1s notional must exceed this multiple of the 60s-avg-per-sec.
  # 8× = only enter when trading volume is 8 times above normal pace.
  intensity_spike_mult: 8.0

  # Gate 2: Volatility expansion (EWMA ratio)
  # sigma_fast (500ms half-life) must exceed vol_expansion_ratio × sigma_slow (45s half-life).
  # Filters out entries during flat markets where move is just ambient noise.
  sigma_fast_halflife_ms: 500    # reacts within one burst duration (~500ms)
  sigma_slow_halflife_ms: 45000
  vol_expansion_ratio: 2.0      # sigma_fast must be 2× background to trigger

  # Gate 3: Notional Aggressive Flow Imbalance
  # (buy_notional - sell_notional) / total must exceed afi_threshold in direction of move.
  # 0.5 = buy side must account for ≥75% of notional flow (or ≤25% for shorts).
  afi_threshold: 0.5

  # Gate 4: Trend direction filter
  # Only enter LONG when mid > 5-min EWMA trend; only SHORT when mid < trend.
  # Blocks counter-trend burst entries which are the main source of timeout losses.
  trend_halflife_ms: 300000   # 5-min half-life; slow-moving trend reference
  trend_warmup_ms: 300000     # require 5 min of data before enforcing this gate
  # ──────────────────────────────────────────────────────────────────
  entry_qty:
    BTCUSDT: 0.001
    ETHUSDT: 0.01
  exit:
    # Maker fill model cost: 2 bps fee/side × 2 = 4 bps round-trip (no slippage).
    # Break-even with 62% win rate: TP net = 10-4 = +6 bps, SL net = -(6+4) = -10 bps.
    # 0.62 × 6 > 0.38 × 10 → 3.72 > 3.80 — need ~63%; achievable for genuine bursts.
    max_hold_ms: 3000         # 3 s is enough to reach 10 bps in a real spike
    take_profit_bps: 10.0       # gross TP; net = +6 bps after 4 bps maker cost
    stop_loss_bps: 5.0          # gross SL; net = -9 bps — 3 bps was below market noise floor
    ratchet_trigger_bps: 5.0    # once gross >= 5 bps, activate floor stop
    ratchet_floor_bps: 4.0      # floor stop at 4 bps gross = 0 net (fee breakeven)
  cooldown_ms: 2000           # 2s: prevents re-entering the same burst 3-4 times
risk:
  max_trades_per_min: 60
  daily_loss_usd: 50
  max_consecutive_losses: 5
  max_spread_bps: 6
  max_ws_lag_ms: 300
  reconnect_storm:
    max_reconnects: 5
    window_min: 10
telemetry:
  flush_interval_s: 1
  latency_log_interval_s: 60
