mode: observe
venue: binance_usdm_futures
symbols:
- BTCUSDT
- ETHUSDT
data_streams:
- bookTicker
- aggTrade
- markPrice_1s
strategy:
  type: burst_momentum
  window_ms: 250             # burst detection window for AFI / trade-count (ms)
  trade_count_trigger: 5     # minimum trades in window (noise floor only)
  move_bps_trigger: 0.5      # almost no price-move required — let flow gates drive timing

  # ── Three-gate signal filters (all must fire simultaneously) ──────
  # Gate 1: Relative intensity spike
  # Current 1s notional must exceed this multiple of the 60s-avg-per-sec.
  # 8× = only enter when trading volume is 8 times above normal pace.
  intensity_spike_mult: 8.0

  # Gate 2: Volatility expansion (EWMA ratio)
  # sigma_fast (500ms half-life) must exceed vol_expansion_ratio × sigma_slow (45s half-life).
  # Filters out entries during flat markets where move is just ambient noise.
  sigma_fast_halflife_ms: 500    # reacts within one burst duration (~500ms)
  sigma_slow_halflife_ms: 45000
  vol_expansion_ratio: 2.0      # sigma_fast must be 2× background to trigger

  # Gate 3: Notional Aggressive Flow Imbalance
  # (buy_notional - sell_notional) / total must exceed afi_threshold in direction of move.
  # 0.5 = buy side must account for ≥75% of notional flow (or ≤25% for shorts).
  afi_threshold: 0.5

  # Gate 4: Micro-regime crossover filter (matched to burst timescale)
  # fast EMA (2s) > slow EMA (20s) → micro-uptrend → LONG only; reverse → SHORT only.
  # Both halflives match the burst window (~250ms–5s), not macro trend-following.
  # 1m/5m crossovers are too slow — by the time they cross, the burst is over.
  trend_halflife_ms: 20000         # 20s slow micro-EMA (regime reference)
  short_trend_halflife_ms: 2000    # 2s fast micro-EMA (burst-speed momentum)
  trend_warmup_ms: 60000           # 60s warmup is enough for 20s EWMA to stabilize
  
  # ── Advanced Momentum Parameters ──────────────────────────────────
  obi_threshold: 0.2
  short_only: true
  adaptive_vol_multiplier: 0.0
  # ──────────────────────────────────────────────────────────────────
  
  # ── Per-Symbol Overrides ──────────────────────────────────────────
  # BTC has thicker books and lower volatility; ETH is thinner and wilder.
  symbol_overrides:
    BTCUSDT:
      obi_threshold: 0.25           # Require heavier imbalance on thick BTC books
      intensity_spike_mult: 6.0     # Lower spike threshold for thick books
      move_bps_trigger: 0.5         # Smaller physical move required
    ETHUSDT:
      obi_threshold: 0.15           # ETH books are thinner, 15% is significant
      intensity_spike_mult: 10.0    # Require massive volume spikes to avoid ETH noise
      move_bps_trigger: 1.0         # Require larger physical moves to confirm
      exit:
        take_profit_bps: 12.0       # Larger TP for higher volatility
        stop_loss_bps: 6.0
  # ──────────────────────────────────────────────────────────────────
  
  entry_qty:
    BTCUSDT: 0.001
    ETHUSDT: 0.01
  exit:
    # Maker fill model cost: 2 bps fee/side × 2 = 4 bps round-trip (no slippage).
    # Break-even with 62% win rate: TP net = 10-4 = +6 bps, SL net = -(6+4) = -10 bps.
    # 0.62 × 6 > 0.38 × 10 → 3.72 > 3.80 — need ~63%; achievable for genuine bursts.
    max_hold_ms: 30000        # 30s: let trailing stop manage exits; timeout only as last resort
    take_profit_bps: 10.0       # gross TP; net = +6 bps after 4 bps maker cost
    stop_loss_bps: 5.0          # gross SL; net = -9 bps — 3 bps was below market noise floor
    trail_trigger_bps: 4.0      # start trailing once gross >= 4 bps (fee breakeven)
    trail_bps: 2.0              # trail 2 bps below high watermark (peak=6→stop=4, peak=8→stop=6)
  cooldown_ms: 2000           # 2s: prevents re-entering the same burst 3-4 times
risk:
  max_trades_per_min: 60
  daily_loss_usd: 50
  max_consecutive_losses: 5
  max_spread_bps: 6
  max_ws_lag_ms: 300
  reconnect_storm:
    max_reconnects: 5
    window_min: 10
telemetry:
  flush_interval_s: 1
  latency_log_interval_s: 60
